<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bếp Chú 7 | Đặc Sản Mắm Truyền Thống</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="data_daily.js" defer></script>

    <style>
        :root { 
            --primary: #e63946; 
            --dark: #1d3557; 
            --bg: #f8f9fa;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--dark); }

        /* PHẦN COVER NỀN - TỰ CO GIÃN */
        .hero { 
            position: relative;
            height: 60vh; /* Chiếm 60% chiều cao màn hình */
            min-height: 300px;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('assets/cover.jpg') no-repeat center center; /* ĐƯỜNG DẪN ẢNH COVER */
            background-size: cover; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* LOGO NHẤN MẠNH BRAND */
        .logo-brand {
            width: 120px; /* Size logo desktop */
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        @media (max-width: 768px) {
            .hero { height: 40vh; } /* Mobile thì ảnh thấp xuống cho gọn */
            .logo-brand { width: 80px; } /* Mobile logo nhỏ lại */
            .hero h1 { font-size: 1.8em; }
        }

        .container { max-width: 1100px; margin: -50px auto 50px; padding: 0 20px; position: relative; z-index: 10; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } }
        .chart-box { height: 400px; width: 100%; }
        .cta-btn { display: inline-block; background: var(--primary); color: white; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <section class="hero">
        <img src="assets/logo.png" alt="Logo Bếp Chú 7" class="logo-brand">
        <h1>BẾP CHÚ 7 - ĐẬM ĐÀ VỊ QUÊ</h1>
        <p>Hệ thống số hóa sản lượng mắm truyền thống</p>
    </section>

    <div class="container">
        <div class="card" style="text-align: center;">
            <h2 style="color: var(--primary);">MINH BẠCH - CHẤT LƯỢNG</h2>
            <p>Dữ liệu sản xuất được cập nhật trực tiếp từ xưởng ủ chượp.</p>
        </div>

        <div class="grid">
            <div class="card">
                <div id="chart-pie" class="chart-box"></div>
            </div>
            <div class="card">
                <div id="chart-race" class="chart-box"></div>
            </div>
        </div>

        <div style="text-align: center;">
            <a href="https://zalo.me/your-number" class="cta-btn">NHẬN BÁO GIÁ SỈ</a>
        </div>
    </div>

    <script>
        window.onload = function() {
            // Khởi tạo biểu đồ Tròn
            var pieChart = echarts.init(document.getElementById('chart-pie'));
            pieChart.setOption({
                title: { text: 'Sản phẩm chủ lực', left: 'center' },
                series: [{
                    type: 'pie',
                    radius: '60%',
                    data: [
                        { value: 450, name: 'Mắm Linh', itemStyle: {color: '#e63946'} },
                        { value: 300, name: 'Mắm Sặc', itemStyle: {color: '#f4a261'} },
                        { value: 200, name: 'Mắm Chốt', itemStyle: {color: '#e9c46a'} }
                    ]
                }]
            });

            // Khởi tạo biểu đồ Đua (từ data_daily.js)
            var raceChart = echarts.init(document.getElementById('chart-race'));
            if (typeof optionBepChu7 !== 'undefined') {
                raceChart.setOption(optionBepChu7);
                if (typeof startBếpChú7Race === 'function') { startBếpChú7Race(raceChart); }
            }
            window.onresize = function() { pieChart.resize(); raceChart.resize(); };
        };
    </script>
</body>
</html>
